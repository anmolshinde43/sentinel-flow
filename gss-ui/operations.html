<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations | Sentinel-Flow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-accent: #3b82f6;
            --secondary-accent: #06b6d4;
            --card-bg: #1e293b;
            --card-border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- TOP NAVBAR --- */
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            cursor: pointer;
        }

        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
            background: var(--card-bg);
        }

        /* --- MAIN CONTENT CENTERED --- */
        .center-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            animation: fadeIn 0.8s ease;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-main);
        }

        .card-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 550px;
        }

        /* --- CARD STYLING --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary-accent);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--secondary-accent);
        }

        .card p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* --- BUTTONS --- */
        .primary-btn {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        /* --- TASK LIST STYLING --- */
        .task-list {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
        }

        .task-list li {
            background: var(--bg-color);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            cursor: default;
        }

        .task-list li:hover {
            border-color: var(--primary-accent);
        }

        .task-list li::before {
            content: "";
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--secondary-accent);
            margin-right: 12px;
            box-shadow: 0 0 8px var(--secondary-accent);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <nav>
        <a onclick="window.location.href='index.html'" class="nav-logo">SENTINEL-FLOW</a>
        <button onclick="window.location.href='index.html'" class="back-btn">← Back to Home</button> 
    </nav>

    <section class="center-page">
        <h2 class="section-title">Contract Workflow Operations</h2>

        <div class="card-container">
            <div class="card">
                <h3>Create Smart Contract</h3>
                <p>Start a new automated workflow for Interns, Contractors, or Employees.</p>
                <button class="primary-btn" onclick="window.location.href='create-contract.html'">Start Workflow</button>
            </div>

            <div class="card">
                <h3>Pending Workflow Tasks</h3>
                <p style="margin-bottom: 0.5rem; font-size: 0.9rem;">Actions requiring your attention:</p>
                <ul class="task-list">
                    <li>Safety Officer Approval</li>
                    <li>Senior Developer Code Review</li>
                    <li>Mentor Performance Evaluation</li>
                </ul>
            </div>
        </div>
    </section>

</body>
</html>
