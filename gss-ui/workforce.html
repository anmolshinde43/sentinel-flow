<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforces | Sentinel-Flow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-accent: #3b82f6; 
            --secondary-accent: #06b6d4; 
            --success-accent: #10b981; 
            --warning-accent: #f59e0b; 
            --danger-accent: #f43f5e;
            --card-bg: #1e293b;
            --card-border: #334155;
            --input-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- TOPBAR & NAVBAR --- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg-color);
            border-bottom: 1px solid var(--card-border);
        }

        .topbar h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .profile span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .navbar {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow-x: auto;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-btn.active {
            background: var(--primary-accent);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        /* --- DASHBOARD CONTAINER --- */
        .dashboard-container {
            padding: 2.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            animation: fadeIn 0.6s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title h2 {
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
        }

        .toolbar input {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            min-width: 250px;
        }

        .toolbar button {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* --- MODAL STYLES --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            width: 400px;
        }

        .modal h3 { margin-bottom: 1rem; }
        .modal input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: white;
            border-radius: 6px;
        }

        .modal-actions { display: flex; gap: 10px; }

        /* --- TABLE STYLES --- */
        .table-responsive {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1.2rem 1.5rem; text-align: left; border-bottom: 1px solid var(--card-border); }
        
        .avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: var(--card-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.85rem;
        }

        .badge {
            padding: 0.35rem 0.85rem; border-radius: 50px;
            font-size: 0.8rem; font-weight: 600;
        }
        .active-status { background: rgba(16, 185, 129, 0.15); color: var(--success-accent); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <h1>SENTINEL-FLOW</h1>
        <div class="profile">
            <span>Sarah Jenkins | HR Lead</span>
        </div>
    </header>

    <nav class="navbar">
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn active" onclick="location.href='workforce.html'">Workforces</button>
    <button class="nav-btn" onclick="location.href='operations.html'">Operations</button>
    <button class="nav-btn" onclick="location.href='insights.html'">Insights</button>
    <button class="nav-btn" onclick="location.href='governance.html'">Governance Vault</button>
    <button class="nav-btn" onclick="location.href='help.html'">Help Center</button>
    </nav>

    <div class="dashboard-container">
        <div class="section-header">
            <div class="header-title">
                <h2>Workforce Directory</h2>
                <p>Manage employee records and current statuses.</p>
            </div>
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="Search employees..." onkeyup="filterTable()">
                <button onclick="toggleModal(true)">+ Add Employee</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Employee Name</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>New Employee</h3>
            <input type="text" id="empName" placeholder="Full Name">
            <input type="text" id="empRole" placeholder="Job Role">
            <input type="email" id="empEmail" placeholder="Email Address">
            <input type="number" id="empSalary" placeholder="Salary">
            <div class="modal-actions">
                <button onclick="submitEmployee()" style="flex:2; background: var(--primary-accent); border:none; color:white; padding: 0.8rem; border-radius:6px; cursor:pointer;">Add Record</button>
                <button onclick="toggleModal(false)" style="flex:1; background: transparent; border: 1px solid var(--card-border); color: white; border-radius:6px; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        // 1. Fetch and Display Employees
        async function fetchEmployees() {
            try {
                const response = await fetch(`${API_URL}/employees`);
                const data = await response.json();
                const tableBody = document.getElementById('employeeTableBody');
                tableBody.innerHTML = '';

                data.forEach(emp => {
                    const initials = emp.name.split(' ').map(n => n[0]).join('').toUpperCase();
                    const row = `
                        <tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <div class="avatar">${initials}</div>
                                    <span class="emp-name-cell">${emp.name}</span>
                                </div>
                            </td>
                            <td>${emp.role}</td>
                            <td style="color:var(--text-muted); font-size:0.9rem;">${emp.email}</td>
                            <td><span class="badge active-status">Active</span></td>
                            <td>
                                <button style="background:transparent; border:1px solid var(--card-border); color:var(--text-muted); padding:4px 8px; border-radius:4px; cursor:pointer;">Edit</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching employees:", error);
            }
        }

        // 2. Toggle Modal
        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
        }

        // 3. Submit New Employee
        async function submitEmployee() {
            const payload = {
                name: document.getElementById('empName').value,
                role: document.getElementById('empRole').value,
                email: document.getElementById('empEmail').value,
                salary: parseFloat(document.getElementById('empSalary').value)
            };

            try {
                const response = await fetch(`${API_URL}/employees`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    toggleModal(false);
                    fetchEmployees(); // Refresh list
                    alert("Employee added successfully!");
                }
            } catch (error) {
                alert("Failed to add employee. Is the backend running?");
            }
        }

        // 4. Client-side Search Filter
        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.querySelectorAll("#employeeTableBody tr");
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }

        // Initialize
        window.onload = fetchEmployees;
    </script>
</body>
</html>
