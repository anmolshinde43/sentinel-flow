<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Workflow | Sentinel-Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-accent: #3b82f6;
            --secondary-accent: #06b6d4;
            --card-bg: #1e293b;
            --card-border: #334155;
            --input-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 { margin-bottom: 0.5rem; font-size: 1.8rem; }
        p.subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--primary-accent); }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: white;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">SENTINEL-FLOW</a>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Initialize New Workflow</h2>
            <p class="subtitle">Deploy an automated smart contract for personnel management.</p>

            <form id="workflowForm">
                <div class="form-group">
                    <label>Personnel Name</label>
                    <input type="text" id="personName" placeholder="e.g. Alex Rivera" required>
                </div>

                <div class="form-group">
                    <label>Contract Type</label>
                    <select id="contractType">
                        <option value="intern">Internship Agreement</option>
                        <option value="contractor">Independent Contractor</option>
                        <option value="fulltime">Full-Time Employee</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="dept" placeholder="e.g. Engineering" required>
                </div>

                <div class="form-group">
                    <label>Initial Expiry / Review Date</label>
                    <input type="date" id="date" required>
                </div>

                <button type="submit" class="submit-btn">Deploy Workflow</button>
            </form>

            <a href="operations.html" class="back-link">← Cancel and Go Back</a>
        </div>
    </div>

    <script>
        document.getElementById('workflowForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('personName').value,
                type: document.getElementById('contractType').value,
                department: document.getElementById('dept').value,
                date: document.getElementById('date').value
            };

            console.log("Submitting Workflow:", data);
            
            // This is where you would call your FastAPI endpoint
            // Example: await fetch('http://127.0.0.1:8000/api/workflow', { method: 'POST', body: JSON.stringify(data) });

            alert("Workflow Initialized Successfully!");
            window.location.href = 'operations.html';
        };
    </script>
</body>
</html>
