<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel-Flow | NLP Sanitizer</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #10b981;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        textarea { 
            width: 100%; 
            height: 150px; 
            background: #0f172a; 
            color: #cbd5e1; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            padding: 15px; 
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        button { 
            background: var(--accent); 
            color: #064e3b; 
            font-weight: bold; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #34d399; transform: translateY(-2px); }

        .result-area {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .output-box {
            background: #0f172a;
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 12px;
            position: relative;
            line-height: 1.6;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #334155;
            color: white;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ NLP Review Sanitizer</h2>
    <p style="color: #94a3b8; margin-bottom: 20px;">AI-powered tool to remove bias and legal risk from manager feedback.</p>
    
    <textarea id="reviewText" placeholder="Example: John is lazy and always late. He needs to go..."></textarea>
    
    <button onclick="sanitize()">🚀 CLEANSE FOR COMPLIANCE</button>

    <div id="resultArea" class="result-area">
        <div id="statusBadge" class="status-badge">Legally Protected</div>
        <div class="output-box">
            <button class="copy-btn" onclick="copyText()">Copy</button>
            <p id="cleanText" style="margin: 0; color: #e2e8f0;"></p>
        </div>
    </div>
</div>

<script>
    async function sanitize() {
        const text = document.getElementById('reviewText').value;
        const resultArea = document.getElementById('resultArea');
        
        if(!text) return alert("Please enter some text first!");

        try {
            const res = await fetch('http://127.0.0.1:8000/api/ai/sanitize-review', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({raw_text: text})
            });
            const data = await res.json();
            
            resultArea.style.display = 'block';
            document.getElementById('cleanText').innerText = data.sanitized_review;
            document.getElementById('statusBadge').innerText = data.status;
        } catch (err) {
            alert("Connection error! Is main.py running?");
        }
    }

    function copyText() {
        const text = document.getElementById('cleanText').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
